    name: "Conservatory"
    one_wire_id: bus2
    id: conservatory_sensor

  - platform: dallas_temp
    address: 0xb400000591fb9928
    name: "Hot Water Tank"
    one_wire_id: bus2
    id: hotwatertank_sensor
    on_value_range:
        - above: 75.0
          then:
            - switch.turn_on: upstairsbathroom_relay

switch:
  - platform: gpio
    name: "Conservatory Relay"
    id: conservatory_relay
    restore_mode: ALWAYS_ON
    on_turn_on:
      - switch.turn_on: circulationpump_relay
    on_turn_off:
      then:
        - if:
            condition:
              and:
                - switch.is_off: poshroom_relay
                - switch.is_off: abbeysroom_relay
                - switch.is_off: nicksroom_relay
                - switch.is_off: masterbedroom_relay
                - switch.is_off: upstairsbathroom_relay
                - switch.is_off: kitchendiner_relay
                - switch.is_off: kitchen_relay
                - switch.is_off: utilityroom_relay
                - switch.is_off: pennysroom_relay
                - switch.is_off: hallway_relay
            then:
               - switch.turn_off: circulationpump_relay
    pin:
      number: GPIO16
      inverted: true
    
  - platform: gpio
    name: "Kitchen Diner Relay"
    id: kitchendiner_relay
    restore_mode: ALWAYS_ON
