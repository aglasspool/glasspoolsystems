                - switch.is_off: masterbedroom_relay
                - switch.is_off: upstairsbathroom_relay
                - switch.is_off: pennysroom_relay
                - switch.is_off: kitchen_relay
                - switch.is_off: utilityroom_relay
                - switch.is_off: conservatory_relay
                - switch.is_off: hallway_relay
