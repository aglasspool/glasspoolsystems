esphome:
  name: hartstemps

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "/D9nyhDU/wRC7/9qwAXKlGBdRP8u43Dgn6kBGFfGp+E="

ota:
  - platform: esphome


wifi:
  ssid: "Linksys28572"
  password: "tz**********nch"

one_wire:
  - platform: gpio
    pin: GPIO22    
    id: bus1

  - platform: gpio
    pin: GPIO23
    id: bus2

sensor:
  - platform: dallas_temp
    address: 0x990000058fad5028
